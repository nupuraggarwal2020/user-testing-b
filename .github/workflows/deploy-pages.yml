name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chatgpt-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: chatgpt-app

      - name: Build chatgpt-app + Canva editor (Variant B baked in)
        run: npm run build:all
        working-directory: chatgpt-app
        env:
          GITHUB_PAGES: true
          # Bake the brand variant into the deployed bundle so the shared
          # link defaults to Variant B (no ?variant= query string needed).
          # Change to 'a' (or remove) to publish the control variant instead.
          VITE_BRAND_VARIANT: b

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
